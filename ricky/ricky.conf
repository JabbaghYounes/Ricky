# ricky.conf — project-specific settings
# Source this from ricky/ alongside agents/ and scripts/
# All values are optional — defaults are applied by scripts

# Command to run tests
TEST_CMD="npm test"

# Base branch to create feature branches from
BASE_BRANCH="main"

# Max debug retry attempts before aborting
MAX_RETRIES=3

# Design agents to run (space-separated, or "none" to skip)
# Available: system-architect db-designer api-designer ux-designer
DESIGN_AGENTS="system-architect db-designer api-designer ux-designer"

# Implementation agents to run in parallel (space-separated)
# For backend-only projects, set to "backend"
# Available: backend frontend
IMPL_AGENTS="backend frontend"

# Claude CLI permission mode for non-interactive agent execution
# --dangerously-skip-permissions: allows all tools (Read, Write, Edit, Bash, etc.)
# Alternative: --allowedTools "Read,Write,Edit,Bash,Glob,Grep" for stricter control
CLAUDE_PERMISSIONS="--dangerously-skip-permissions"

# Claude model for planning/design stages (cheaper, saves tokens)
# Examples: claude-sonnet-4-6, claude-haiku-4-5-20251001
DESIGN_MODEL="claude-sonnet-4-6"

# Claude model for implementation stages (more capable)
# Examples: claude-sonnet-4-6, claude-opus-4-6
IMPL_MODEL="claude-sonnet-4-6"

# Max tool-use turns per agent (limits token consumption)
# Lower = cheaper but less thorough. 0 = unlimited.
MAX_TURNS=25
